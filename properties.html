<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties | Invest Space</title>
    <meta name="description" content="Browse our exclusive real estate property listings.">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .properties-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            padding: 4rem 0;
        }

        .filter-sidebar {
            padding: 2rem;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .filter-group {
            margin-bottom: 1.5rem;
        }

        .filter-group select, .filter-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
        }

        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .property-card {
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .property-card:hover {
            transform: translateY(-5px);
        }

        .property-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .property-content {
            padding: 1.5rem;
        }

        .property-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .property-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .property-location {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .property-meta {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        @media (max-width: 900px) {
            .properties-layout {
                grid-template-columns: 1fr;
            }
            .filter-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="home.html" class="logo">
                <i data-lucide="building-2"></i> Invest<span>Space</span>
            </a>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="properties.html" class="active">Properties</a>
                <a href="education.html">Education</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>`n                <a href="dashboard.html">Dashboard</a>
                <a href="contact.html" class="btn btn-primary">Contact Us</a>
            </div>
            <button class="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Exclusive Properties</h1>
            <p>Find the perfect investment opportunity that matches your criteria.</p>
        </div>
    </header>

    <div class="container properties-layout">
        <aside class="glass-panel filter-sidebar">
            <h3 style="margin-bottom: 1.5rem;">Filter Properties</h3>
            <div class="filter-group">
                <label class="form-label">Location</label>
                <select id="filter-location">
                    <option value="">Any Location</option>
                    <option value="New York, NY">New York, NY</option>
                    <option value="Miami, FL">Miami, FL</option>
                    <option value="Austin, TX">Austin, TX</option>
                    <option value="Beverly Hills, CA">Beverly Hills, CA</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="form-label">Property Type</label>
                <select id="filter-type">
                    <option value="">Any Type</option>
                    <option value="Apartment">Apartment</option>
                    <option value="Single Family">Single Family</option>
                    <option value="Commercial">Commercial</option>
                    <option value="Mansion">Mansion</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="form-label">Max Price</label>
                <input type="number" id="filter-price" placeholder="e.g. 5000000">
            </div>
            <button class="btn btn-primary" id="apply-filters-btn" style="width: 100%;">Apply Filters</button>
        </aside>

        <main class="property-grid" id="properties-container">
            <!-- Properties injected by JS -->
        </main>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="margin-top: 0;">
                <p>&copy; 2026 Invest Space. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
