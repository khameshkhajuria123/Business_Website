<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Invest Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.9)), url('images/hero_bg.png') center/cover;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .login-logo span {
            color: var(--accent);
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .login-card .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="login-card animate-up">
        <div class="login-logo">
            <i data-lucide="building-2" style="width: 32px; height: 32px;"></i> Invest<span>Space</span>
        </div>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please log in to access your investment portfolio and
            the properties directory.</p>

        <div id="error-msg" class="error-message">Invalid email or password. Please try again.</div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email / Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Access
                Platform</button>
        </form>

        <p style="color: var(--text-muted); margin-top: 2rem; font-size: 0.9rem;">
            Demo credentials: <strong>khamesh</strong> / <strong>khamesh@123</strong>
        </p>
    </div>

    <script>
        lucide.createIcons();

        // Check if already logged in, redirect to home
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'home.html';
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = this.querySelector('button');

            btn.textContent = 'Authenticating...';
            btn.style.opacity = '0.7';

            setTimeout(() => {
                if (user === 'khamesh' && pass === 'khamesh@123') {
                    // Success
                    sessionStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'home.html';
                } else {
                    // Error
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Access Platform';
                    btn.style.opacity = '1';
                }
            }, 800);
        });
    </script>
</body>

</html>
